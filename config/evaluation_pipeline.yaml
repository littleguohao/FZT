# FZT排序增强策略评估流水线配置

evaluation:
  # 评估模式
  mode: "comprehensive"  # comprehensive, quick, model-only, backtest-only, risk-only, compare
  
  # 数据源配置
  data_sources:
    training:
      enabled: true
      path: "results/training_reports"
      format: "yaml"  # yaml, json, pickle
      required: false
      
    backtest:
      enabled: true
      path: "results/backtest_reports"
      format: "yaml"
      required: true
      
    models:
      enabled: true
      path: "results/models"
      format: "pkl"
      required: false
      
    features:
      enabled: true
      path: "results/features"
      required: false
      
  # 模型评估配置
  model_evaluation:
    enabled: true
    
    # 排序指标
    ranking_metrics:
      enabled: true
      metrics: ["ndcg@5", "map@5", "mrr", "precision@5", "recall@5", "f1@5"]
      k_values: [1, 3, 5, 10]
      
    # 分类指标
    classification_metrics:
      enabled: true
      metrics: ["accuracy", "f1", "auc", "precision", "recall"]
      threshold: 0.5
      
    # 稳定性测试
    stability_test:
      enabled: true
      time_splits: 5
      metric: "ndcg@5"
      threshold: 0.1  # 允许的最大波动
      
    # 过拟合检测
    overfitting_test:
      enabled: true
      train_test_gap_threshold: 0.15
      validation_test_gap_threshold: 0.1
      
    # 特征分析
    feature_analysis:
      enabled: true
      importance_methods: ["gain", "split", "permutation"]
      top_n_features: 20
      correlation_threshold: 0.8
      
  # 回测评估配置
  backtest_evaluation:
    enabled: true
    
    # 收益指标
    return_metrics:
      enabled: true
      metrics:
        - "total_return"
        - "annual_return"
        - "sharpe_ratio"
        - "information_ratio"
        - "calmar_ratio"
        - "sortino_ratio"
        - "omega_ratio"
        
    # 风险指标
    risk_metrics:
      enabled: true
      metrics:
        - "max_drawdown"
        - "volatility"
        - "beta"
        - "alpha"
        - "tracking_error"
        - "var_95"
        - "cvar_95"
        - "skewness"
        - "kurtosis"
        
    # 成本分析
    cost_analysis:
      enabled: true
      metrics:
        - "total_cost"
        - "cost_ratio"
        - "avg_cost_per_trade"
        - "commission_ratio"
        - "stamp_tax_ratio"
        - "slippage_ratio"
        - "impact_ratio"
        
    # 交易分析
    trade_analysis:
      enabled: true
      metrics:
        - "total_trades"
        - "win_rate"
        - "profit_factor"
        - "avg_win"
        - "avg_loss"
        - "largest_win"
        - "largest_loss"
        - "avg_holding_period"
        
    # 基准对比
    benchmark_comparison:
      enabled: true
      benchmark_code: "SH000300"  # 沪深300
      metrics: ["excess_return", "information_ratio", "tracking_error"]
      
    # 敏感性分析
    sensitivity_analysis:
      enabled: false
      parameters:
        top_k: [3, 5, 7, 10]
        hold_days: [1, 3, 5, 10]
        commission_rate: [0.0002, 0.0003, 0.0005]
        
  # 风险评估配置
  risk_evaluation:
    enabled: true
    
    # 市场风险评估
    market_risk:
      enabled: true
      metrics:
        - "systematic_risk"
        - "idiosyncratic_risk"
        - "correlation_risk"
        - "volatility_risk"
        - "beta_exposure"
        
    # 流动性风险评估
    liquidity_risk:
      enabled: true
      metrics:
        - "turnover_risk"
        - "bid_ask_spread"
        - "market_depth"
        - "liquidity_score"
        
    # 操作风险评估
    operational_risk:
      enabled: true
      metrics:
        - "concentration_risk"
        - "industry_concentration"
        - "style_exposure"
        - "model_risk"
        - "execution_risk"
        
    # 压力测试
    stress_test:
      enabled: true
      scenarios:
        - "market_crash"  # 市场崩盘
        - "liquidity_crisis"  # 流动性危机
        - "volatility_spike"  # 波动率飙升
        - "sector_rotation"  # 行业轮动
      severity: "moderate"  # mild, moderate, severe
      
  # 特征分析配置
  feature_analysis:
    enabled: true
    
    # 重要性分析
    importance_analysis:
      enabled: true
      methods: ["gain", "split", "permutation", "shap"]
      top_n: 30
      threshold: 0.01
      
    # 相关性分析
    correlation_analysis:
      enabled: true
      method: "pearson"  # pearson, spearman, kendall
      threshold: 0.7
      visualize: true
      
    # 稳定性分析
    stability_analysis:
      enabled: true
      time_periods: ["2005-2010", "2011-2015", "2016-2020"]
      metric: "importance_rank"
      threshold: 0.3
      
    # 特征贡献分析
    contribution_analysis:
      enabled: true
      method: "shap"  # shap, lime, permutation
      top_contributors: 10
      
  # 报告配置
  reporting:
    # 输出目录
    output_dir: "results/evaluation_reports"
    
    # 报告格式
    formats:
      - "html"  # 交互式HTML报告
      - "pdf"   # PDF报告
      - "yaml"  # 结构化数据
      - "json"  # JSON格式
      
    # 报告内容
    content:
      include_executive_summary: true
      include_detailed_analysis: true
      include_charts: true
      include_tables: true
      include_recommendations: true
      include_comparisons: true
      
    # 可视化配置
    visualization:
      chart_style: "seaborn"  # matplotlib, seaborn, plotly
      color_palette: "Set2"
      figure_size: [12, 8]
      dpi: 150
      save_figures: true
      figure_format: "png"  # png, pdf, svg
      
  # 对比评估配置
  comparison:
    enabled: false
    strategies:
      - name: "baseline"
        path: "results/baseline"
      - name: "improved"
        path: "results/improved"
        
    comparison_metrics:
      - "annual_return"
      - "sharpe_ratio"
      - "max_drawdown"
      - "win_rate"
      - "cost_ratio"
      
    statistical_tests:
      enabled: true
      tests: ["t_test", "mann_whitney", "bootstrap"]
      confidence_level: 0.95
      
  # 高级配置
  advanced:
    # 性能优化
    performance:
      parallel_processing: true
      max_workers: 4
      memory_limit_gb: 8
      cache_enabled: true
      cache_dir: "results/cache/evaluation"
      
    # 数据验证
    data_validation:
      enabled: true
      check_data_integrity: true
      check_data_consistency: true
      handle_missing_data: "warn"  # warn, skip, interpolate
      
    # 调试配置
    debug:
      enabled: false
      save_intermediate_results: false
      verbose_logging: false
      profiling_enabled: false
      
    # 自定义评估模块
    custom_modules:
      enabled: false
      modules: []
      
# 环境配置
environment:
  python_version: "3.9+"
  required_packages:
    - "numpy>=1.23.0"
    - "pandas>=1.5.0"
    - "scikit-learn>=1.3.0"
    - "matplotlib>=3.7.0"
    - "seaborn>=0.12.0"
    - "plotly>=5.14.0"  # 可选，用于交互式图表
    
