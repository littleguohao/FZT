# QLib完整整合流水线配置

# QLib配置
qlib:
  provider_uri: "/Users/lucky/.qlib/qlib_data/cn_data"
  region: "cn"
  market: "all"
  
# FZT预筛选配置
fzt_screen:
  enabled: true
  threshold: 0.0  # FZT>0
  min_screened_stocks: 10  # 最少筛选股票数
  
# LambdaRank配置
lambdarank:
  objective: "lambdarank"
  metric: "ndcg"
  learning_rate: 0.05
  num_leaves: 31
  max_depth: 5
  num_iterations: 100
  early_stopping_rounds: 10
  seed: 42
  verbosity: -1
  
# 特征配置
features:
  # FZT特征
  fzt_features: true
  include_vars: true  # var1a-var6a
  include_brick: true  # 砖型图特征
  include_returns: true  # 收益率特征
  
  # 价格特征
  price_features: true
  volume_features: true
  
  # 技术指标
  moving_averages: true
  volatility: true
  momentum: true
  
# 选股配置
selection:
  top_k: 5  # 每日选择Top 5
  min_confidence: 0.6  # 最小置信度
  diversification: true  # 分散化
  
# 时间配置
time:
  # 训练期间
  train_start: "2005-01-01"
  train_end: "2017-12-31"
  
  # 验证期间
  val_start: "2018-01-01"
  val_end: "2020-12-31"
  
  # 测试期间
  test_start: "2021-01-01"
  test_end: "2026-02-06"
  
  # 前瞻天数
  lookahead_days: 1  # T+1
  
# 回测配置
backtest:
  initial_capital: 1000000  # 初始资金100万
  commission_rate: 0.0003  # 佣金0.03%
  stamp_tax_rate: 0.001  # 印花税0.1%
  slippage_rate: 0.0005  # 滑点0.05%
  position_limit: 0.2  # 单只股票仓位限制20%
  max_drawdown_limit: 0.15  # 最大回撤限制15%
  
# 评估配置
evaluation:
  metrics:
    - "ndcg@5"
    - "map@5"
    - "precision@5"
    - "recall@5"
    - "annual_return"
    - "sharpe_ratio"
    - "max_drawdown"
    
  report_level: "detailed"  # detailed/summary
  
# 输出配置
output:
  model_dir: "results/qlib_models"
  report_dir: "results/qlib_reports"
  log_level: "INFO"
  save_intermediate: true
  save_portfolio_history: true