# FZT排序增强策略训练流水线配置

training:
  # 数据配置
  data:
    source: "qlib"  # qlib, csv, hybrid
    qlib_provider: "~/.qlib/qlib_data"
    region: "cn"
    
    # 时间范围
    time_range:
      train_start: "2005-01-01"
      train_end: "2017-12-31"
      valid_start: "2018-01-01"
      valid_end: "2019-12-31"
      test_start: "2020-01-01"
      test_end: "2020-12-31"
      
    # 股票池
    universe:
      type: "custom"  # custom, index, all
      codes: []  # 空表示使用默认股票池
      min_market_cap: 1000000000  # 10亿
      min_turnover: 10000000  # 1000万
      
    # 字段配置
    fields:
      basic: ["$open", "$high", "$low", "$close", "$volume", "$factor"]
      derived: ["$change", "$vwap"]
      
  # 特征配置
  features:
    # FZT特征
    fzt_features:
      enabled: true
      version: "1.0"
      parameters:
        window_sizes: [5, 10, 20, 60]
        brick_threshold: 0.03
        
    # 技术指标特征
    technical_features:
      enabled: true
      indicators:
        - "sma"
        - "ema"
        - "macd"
        - "rsi"
        - "bollinger"
        - "atr"
        
    # Alpha158特征
    alpha158_features:
      enabled: true
      selection: "top50"  # top50, top100, all
      
    # 特征处理
    processing:
      neutralization: true
      neutralization_method: "market_cap_industry"
      standardization: true
      standardization_method: "zscore"
      missing_value_handling: "fill"
      outlier_handling: "clip"
      
    # 特征选择
    selection:
      enabled: true
      method: "importance"  # importance, correlation, hybrid
      n_features: 50
      importance_threshold: 0.001
      correlation_threshold: 0.8
      
  # 标签配置
  labels:
    # 目标变量
    target:
      type: "future_return"
      horizon: 1  # T+1收益率
      method: "log_return"  # log_return, simple_return
      
    # FZT选股条件
    fzt_condition:
      enabled: true
      threshold: 0
      strict_mode: false
      
    # 排序标签
    ranking_labels:
      type: "binary"  # binary, continuous, percentile
      method: "top_bottom"  # top_bottom, threshold, quantile
      top_ratio: 0.2
      bottom_ratio: 0.2
      
    # LambdaRank数据集
    lambdarank:
      enabled: true
      group_by: "date"
      max_position: 100
      
  # 模型配置
  model:
    trainer_class: "LambdaRankTrainer"
    
    # LightGBM参数
    params:
      objective: "lambdarank"
      metric: ["ndcg@5", "map@5"]
      boosting_type: "gbdt"
      num_leaves: 64
      max_depth: 8
      learning_rate: 0.05
      feature_fraction: 0.8
      bagging_fraction: 0.8
      bagging_freq: 5
      lambda_l1: 0.1
      lambda_l2: 0.1
      min_gain_to_split: 0.0
      min_data_in_leaf: 20
      seed: 42
      
    # 训练参数
    training:
      num_boost_round: 1000
      early_stopping_rounds: 50
      verbose_eval: 100
      keep_training_booster: false
      
  # 训练模式
  mode:
    type: "single"  # single, cv, rolling
    cv_folds: 5
    cv_method: "timeseries"
    rolling_window: 1000
    step_size: 250
    
  # 评估配置
  evaluation:
    metrics:
      ranking: ["ndcg@5", "map@5", "mrr", "precision@5", "recall@5"]
      classification: ["accuracy", "f1", "auc"]
      
    feature_importance:
      enabled: true
      methods: ["gain", "split", "permutation"]
      top_n: 20
      
    stability_test:
      enabled: true
      time_splits: 5
      
    overfitting_test:
      enabled: true
      train_test_gap_threshold: 0.1
      
  # 输出配置
  output:
    # 模型保存
    model:
      dir: "results/models"
      format: "pkl"  # pkl, joblib, json
      save_training_log: true
      save_feature_names: true
      
    # 特征保存
    features:
      dir: "results/features"
      save_processed: true
      save_importance: true
      
    # 报告保存
    reports:
      dir: "results/training_reports"
      formats: ["html", "yaml", "json"]
      include_charts: true
      include_details: true
      
    # 日志保存
    logs:
      dir: "logs/training"
      level: "INFO"
      file: "training.log"
      
  # 高级配置
  advanced:
    # 性能优化
    performance:
      parallel_processing: true
      max_workers: 4
      memory_limit_gb: 8
      cache_enabled: true
      cache_dir: "results/cache"
      
    # 调试配置
    debug:
      enabled: false
      save_intermediate: false
      verbose: false
      
    # 验证配置
    validation:
      enabled: true
      methods: ["walk_forward", "bootstrap"]
      n_iterations: 100
      
# 环境配置
environment:
  python_version: "3.9+"
  qlib_version: "0.9.0+"
  lightgbm_version: "4.0.0+"
  required_packages:
    - "numpy>=1.23.0"
    - "pandas>=1.5.0"
    - "scikit-learn>=1.3.0"
    - "matplotlib>=3.7.0"
    
