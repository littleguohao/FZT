# data_config.yaml - 使用本地A股数据
data:
  source: "local_csv"
  data_path: "/Users/lucky/.openclaw/workspace/ZGNB/B1_DATA/"
  file_pattern: "*.csv"
  
  # 数据字段映射（CSV列名 -> 标准字段名）
  field_mapping:
    date: "Date"
    code: "Code"
    open: "Open"
    high: "High"
    low: "Low"
    close: "Close"
    volume: "Volume"
    amount: "Amount"
    forward_factor: "ForwardFactor"
  
  # 时间范围配置
  # 注意：本地CSV数据时间范围有限（约2025年3月-9月）
  # 采用滚动时间窗口策略，而不是传统的训练/验证/测试划分
  time_ranges:
    # 数据可用范围（根据实际文件时间戳）
    data_start: "2025-03-01"
    data_end: "2025-09-30"
    
    # 滚动窗口配置
    rolling_window:
      window_size: 60  # 训练窗口大小（交易日）
      step_size: 20    # 滚动步长（交易日）
      min_train_size: 40  # 最小训练数据量
    
    # 由于数据有限，采用时间序列交叉验证而不是固定划分
    validation_method: "time_series_cv"
    cv_folds: 3
  
  # 特征配置
  features:
    fzt_formula: true
    technical_factors:
      - "momentum"
      - "volatility"
      - "volume"
      - "price_action"
      - "technical_indicators"
    
  # 数据处理配置
  processing:
    normalize: true
    fill_na: true
    remove_outliers: true
    forward_fill: true  # 使用前复权因子调整价格
    
  # 股票筛选
  stock_filter:
    min_days: 60  # 最少交易日数
    exclude_st: true  # 排除ST股票
    exclude_suspended: true  # 排除停牌股票