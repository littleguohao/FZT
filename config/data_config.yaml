# 数据配置文件
# 所有脚本共享的数据配置

qlib:
  # QLIB数据配置
  path: "results/expanded_stock_data/"
  file: "expanded_data_with_target.csv"
  date_range:
    - "2005-01-01"
    - "2020-12-31"
  
csv:
  # CSV数据配置
  path: "/Users/lucky/Downloads/O_DATA/"
  pattern: "*-all-latest.csv"
  date_range:
    - "2021-01-01"
    - "2026-12-31"
  
target:
  # 目标变量配置
  window: 1      # T+1预测
  threshold: 0   # 上涨阈值，>0表示上涨
  
data_quality:
  # 数据质量检查
  min_rows: 1000
  min_stocks: 10
  max_missing_ratio: 0.1
  
features:
  # 特征配置
  alpha158:
    enabled: true
    factors:
      - volume      # 成交量因子
      - volatility  # 波动率因子
      - bias        # 乖离率因子
      - liquidity   # 流动性因子
      - market_cap  # 市值因子
      - technical   # 技术指标
  
fzt:
  # FZT配置
  enabled: true
  config_file: "config/fzt_config.yaml"
  
model:
  # 模型默认配置
  type: "lightgbm"
  params:
    objective: "binary"
    metric: "binary_logloss"
    learning_rate: 0.05
    num_leaves: 63
    max_depth: 7
    min_child_samples: 10
    subsample: 0.8
    colsample_bytree: 0.8
    reg_alpha: 0.1
    reg_lambda: 0.1
    random_state: 42
    n_estimators: 100
    verbose: -1
  
backtest:
  # 回测默认配置
  initial_capital: 1000000  # 初始资金100万
  position_size: 0.1        # 每只股票仓位10%
  max_positions: 10         # 最多持有10只股票
  transaction_cost: 0.001   # 交易成本0.1%
  stop_loss: 0.05           # 止损5%
  take_profit: 0.10         # 止盈10%
  
output:
  # 输出配置
  results_dir: "results/"
  models_dir: "results/models/"
  reports_dir: "results/reports/"
  logs_dir: "logs/"