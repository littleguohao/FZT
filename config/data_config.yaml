# data_config.yaml - 使用完整本地A股数据
data:
  source: "local_csv"
  data_path: "/Users/lucky/Downloads/O_DATA/"
  file_pattern: "*-all-latest.csv"
  
  # 数据字段映射（CSV列名 -> 标准字段名）
  field_mapping:
    date: "Date"
    code: "Code"
    open: "Open"
    high: "High"
    low: "Low"
    close: "Close"
    volume: "Volume"
    amount: "Amount"
    # 注意：这个数据集没有ForwardFactor字段
    
  # 时间范围配置
  # 数据时间范围：约2021年 - 2026年（4-5年数据）
  time_ranges:
    # 完整数据时间范围
    data_start: "2021-01-01"
    data_end: "2026-12-31"
    
    # 训练/验证/测试时间划分
    train_start: "2021-01-01"
    train_end: "2023-12-31"   # 3年训练数据
    valid_start: "2024-01-01"
    valid_end: "2024-12-31"   # 1年验证数据
    test_start: "2025-01-01"
    test_end: "2026-02-06"    # 约1年测试数据（到最新数据）
    
    # 也可以使用滚动窗口（可选）
    use_rolling_window: false  # 有足够数据，可以使用固定划分
    rolling_window:
      window_size: 252  # 1年交易日的训练窗口
      step_size: 63     # 约1个季度的滚动步长
      min_train_size: 126  # 最小半年数据
  
  # 特征配置
  features:
    fzt_formula: true
    technical_factors:
      - "momentum"
      - "volatility"
      - "volume"
      - "price_action"
      - "technical_indicators"
    
  # 数据处理配置
  processing:
    normalize: true
    fill_na: true
    remove_outliers: true
    forward_fill: true  # 使用前复权因子调整价格
    
  # 股票筛选
  stock_filter:
    min_days: 60  # 最少交易日数
    exclude_st: true  # 排除ST股票
    exclude_suspended: true  # 排除停牌股票