# FZT排序增强策略回测流水线配置

backtest:
  # 时间范围配置
  time_range:
    start: "2020-01-01"
    end: "2020-12-31"
    freq: "day"
    
  # 模型配置
  model:
    path: "results/models/fzt_model.pkl"
    type: "LambdaRank"
    feature_version: "v1.0"
    
  # 策略配置
  strategy:
    class: "FZTEnhancedStrategy"
    params:
      top_k: 5
      hold_days: 1
      commission: 0.0003
      stamp_tax: 0.001
      slippage: 0.001
      min_turnover_ratio: 0.2
      min_market_cap_ratio: 0.3
      max_industry_weight: 0.3
      max_single_weight: 0.4
      
  # 成本模型配置
  cost:
    mode: "detailed"  # detailed, simple, none
    params:
      commission_rate: 0.0003
      stamp_tax_rate: 0.001
      transfer_fee_rate: 0.00002
      slippage_rate: 0.001
      impact_cost_enabled: true
      dynamic_slippage: true
      
  # 风险控制配置
  risk:
    mode: "moderate"  # strict, moderate, none
    params:
      max_single_weight: 0.4
      max_industry_weight: 0.3
      stop_loss_threshold: -0.1
      trailing_stop: true
      volatility_threshold: 0.3
      var_confidence: 0.95
      
  # 账户配置
  account:
    initial_cash: 1000000
    position_ratio: 0.95
    cash_reserve_ratio: 0.05
    margin_ratio: 1.0
    
  # 基准配置
  benchmark:
    code: "SH000300"
    weight: 1.0
    rebalance_freq: "monthly"
    
  # 数据源配置
  data:
    source: "qlib"  # qlib, csv, hybrid
    qlib_provider: "~/.qlib/qlib_data"
    region: "cn"
    fields: ["$open", "$high", "$low", "$close", "$volume", "$factor"]
    
  # 特征配置
  features:
    fzt_features: true
    technical_features: true
    alpha158_features: true
    neutralization: true
    feature_selection: true
    selection_method: "importance"  # importance, correlation, hybrid
    
  # 输出配置
  output:
    report_dir: "results/backtest_reports"
    save_figures: true
    save_trades: true
    save_portfolio: true
    save_metrics: true
    report_format: ["html", "yaml", "json"]
    figure_format: "png"
    
  # 高级配置
  advanced:
    parallel_processing: true
    max_workers: 4
    memory_limit_gb: 8
    cache_enabled: true
    cache_dir: "results/cache"
    debug_mode: false
    profiling_enabled: false
    
  # 批量回测配置
  batch:
    enabled: false
    years: [2020, 2021, 2022]
    rolling_window: 252  # 交易日
    step_size: 63  # 约一个季度
    
  # 敏感性分析配置
  sensitivity:
    enabled: false
    parameters:
      top_k: [3, 5, 7, 10]
      hold_days: [1, 3, 5, 10]
      commission_rate: [0.0002, 0.0003, 0.0005]
      slippage_rate: [0.0005, 0.001, 0.002]
      
  # 监控配置
  monitoring:
    enabled: true
    checkpoints: ["daily", "weekly", "monthly"]
    alerts:
      max_drawdown: -0.15
      daily_loss: -0.05
      volatility_spike: 0.5
      liquidity_warning: 0.1
      
  # 验证配置
  validation:
    enabled: true
    methods: ["walk_forward", "cross_validation", "bootstrap"]
    walk_forward:
      train_size: 1000
      test_size: 250
      step_size: 250
    cross_validation:
      folds: 5
      method: "timeseries"
      
# 日志配置
logging:
  level: "INFO"  # DEBUG, INFO, WARNING, ERROR
  file: "logs/backtest.log"
  max_size_mb: 100
  backup_count: 5
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  
# 环境配置
environment:
  python_version: "3.9+"
  qlib_version: "0.9.0+"
  lightgbm_version: "4.0.0+"
  pandas_version: "1.5.0+"
  numpy_version: "1.23.0+"
  
# 元数据
metadata:
  author: "FZT项目组"
  created_date: "2026-03-02"
  version: "1.0.0"
  description: "FZT排序增强策略回测流水线配置"
  last_modified: "2026-03-02"