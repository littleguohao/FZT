# ranking_config.yaml - FZT排序增强策略排序模型配置
# 用于LightGBM LambdaRank模型训练和评估

# ========== 模型类型配置 ==========
model:
  # 模型类型: lightgbm_lambdarank (排序学习)
  type: "lightgbm_lambdarank"
  
  # 模型用途: ranking (排序) | regression (回归) | binary (二分类)
  objective: "ranking"
  
  # 模型描述
  description: "LightGBM LambdaRank模型，用于股票排序预测"

# ========== LightGBM LambdaRank参数配置 ==========
lightgbm:
  # 基础参数
  objective: "lambdarank"
  metric: "ndcg"
  ndcg_eval_at: [1, 3, 5, 10]  # NDCG评估位置
  
  # 学习参数
  learning_rate: 0.05
  num_leaves: 31
  max_depth: 5
  min_data_in_leaf: 20
  min_sum_hessian_in_leaf: 1e-3
  
  # 正则化参数
  lambda_l1: 0.0
  lambda_l2: 0.0
  feature_fraction: 0.9
  bagging_fraction: 0.8
  bagging_freq: 5
  
  # 训练参数
  num_iterations: 100
  early_stopping_rounds: 10
  verbose: 1
  
  # LambdaRank特定参数
  lambdarank:
    norm: true  # 标准化NDCG
    truncation_level: 10  # 截断级别
    sigmoid: 1.0  # sigmoid参数

# ========== 数据集划分配置 ==========
data_split:
  # 时间序列交叉验证配置
  time_series_cv: true
  
  # 滚动窗口配置
  rolling_window:
    enabled: true
    window_size: 252  # 1年交易日
    step_size: 63     # 1季度
    min_train_size: 126  # 半年
    
  # 固定划分配置（备用）
  fixed_split:
    enabled: false
    train_ratio: 0.7
    valid_ratio: 0.15
    test_ratio: 0.15
    
  # 分组配置（按股票分组）
  group_by_stock: true
  group_column: "stock_code"
  
  # 查询组配置（按日期分组）
  query_group_column: "date"

# ========== 特征列配置 ==========
features:
  # 基础特征列
  base_features:
    - "open"
    - "high"
    - "low"
    - "close"
    - "volume"
    - "amount"
    
  # FZT衍生特征
  fzt_features:
    - "fzt_score"
    - "fzt_momentum"
    - "fzt_strength"
    - "fzt_volatility"
    - "fzt_volume"
    
  # Alpha158特征（如果可用）
  alpha158_features:
    enabled: true
    feature_list: "auto"  # 自动选择Alpha158特征
    
  # 技术指标特征
  technical_features:
    momentum:
      - "roc_5"
      - "roc_10"
      - "roc_20"
      - "rsi_14"
    volatility:
      - "atr_14"
      - "std_20"
      - "bb_upper_20"
      - "bb_lower_20"
    volume:
      - "volume_ma_5"
      - "volume_ma_20"
      - "volume_ratio"
    price_action:
      - "returns_1"
      - "returns_5"
      - "returns_20"
      - "log_returns"
      
  # 特征工程配置
  engineering:
    normalize: true
    standardize: true
    fill_na: true
    fill_method: "median"
    remove_outliers: true
    outlier_threshold: 3.0  # 3倍标准差
    
  # 特征选择配置
  selection:
    enabled: true
    method: "importance"  # importance | correlation | mutual_info
    threshold: 0.01
    max_features: 100

# ========== 评估指标配置 ==========
evaluation:
  # 排序评估指标
  ranking_metrics:
    - "ndcg"
    - "map"
    - "precision_at_k"
    - "recall_at_k"
    
  # 分类评估指标
  classification_metrics:
    - "accuracy"
    - "precision"
    - "recall"
    - "f1"
    - "auc"
    
  # 回归评估指标
  regression_metrics:
    - "mse"
    - "mae"
    - "r2"
    
  # 投资评估指标
  investment_metrics:
    - "ic"  # 信息系数
    - "rank_ic"  # 秩信息系数
    - "icir"  # 信息系数比率
    - "turnover"  # 换手率
    - "sharpe_ratio"  # 夏普比率
    
  # 评估配置
  config:
    top_k_values: [1, 3, 5, 10, 20]  # Top-K评估
    ic_lookback: 20  # IC计算回溯窗口
    ic_decay: 0.5  # IC衰减因子

# ========== 标签配置 ==========
label:
  # 标签类型: future_return | rank | binary
  type: "future_return"
  
  # 未来收益率配置
  future_return:
    horizon: 1  # 预测未来1天
    method: "simple"  # simple | log
    normalization: "zscore"  # zscore | minmax | rank
    
  # 排序标签配置
  ranking:
    group_size: 10  # 每组股票数量
    top_ratio: 0.2  # 前20%为正样本
    bottom_ratio: 0.2  # 后20%为负样本
    
  # 二分类标签配置
  binary:
    threshold: 0.0  # 大于0为正样本
    positive_label: 1
    negative_label: 0

# ========== 训练配置 ==========
training:
  # 批量大小
  batch_size: 1024
  
  # 训练轮数
  epochs: 100
  
  # 早停配置
  early_stopping:
    enabled: true
    patience: 10
    min_delta: 0.001
    
  # 学习率调度
  learning_rate_schedule:
    enabled: true
    method: "step"  # step | exponential | cosine
    step_size: 30
    gamma: 0.1
    
  # 梯度裁剪
  gradient_clipping:
    enabled: true
    max_norm: 1.0
    
  # 设备配置
  device: "cpu"  # cpu | gpu
  num_workers: 4

# ========== 推理配置 ==========
inference:
  # 批量推理大小
  batch_size: 2048
  
  # 输出格式
  output_format: "score"  # score | rank | probability
  
  # 后处理
  postprocessing:
    normalize_scores: true
    clip_extremes: true
    clip_threshold: 3.0
    
  # 缓存配置
  cache_predictions: true
  cache_ttl: 3600  # 1小时

# ========== 环境变量覆盖 ==========
# 支持环境变量覆盖的配置项
env_overrides:
  # 数据路径
  data_path: "${DATA_PATH:-/Users/lucky/Downloads/O_DATA/}"
  
  # 模型保存路径
  model_save_path: "${MODEL_SAVE_PATH:-./models/}"
  
  # 结果保存路径
  result_save_path: "${RESULT_SAVE_PATH:-./results/}"
  
  # 设备配置
  device: "${DEVICE:-cpu}"
  
  # 并行工作数
  num_workers: "${NUM_WORKERS:-4}"

# ========== 日志配置 ==========
logging:
  level: "INFO"  # DEBUG | INFO | WARNING | ERROR
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  file: "./logs/ranking_model.log"
  console: true
  
  # 详细日志配置
  verbose:
    training: true
    evaluation: true
    inference: false