# model_config.yaml
model:
  # 模型类型: lightgbm 或 random_forest
  # 现在libomp已安装，可以使用LightGBM
  type: "lightgbm"
  
  # LightGBM参数
  lightgbm_params:
    objective: "binary"  # 二分类（成功/失败）
    metric: "accuracy"
    learning_rate: 0.05
    num_leaves: 31
    max_depth: 5
    random_state: 42
    n_estimators: 100
    # early_stopping_rounds: 10  # 暂时禁用早停，避免错误
    
  # 随机森林参数（备用）
  random_forest_params:
    n_estimators: 100
    max_depth: 5
    random_state: 42
    n_jobs: -1
    
  # 训练配置
  training:
    target_col: "target"
    threshold: 0.0  # 分类阈值（大于阈值为正类）
    cv_folds: 5
    time_series_cv: true
    
  # 特征配置
  features:
    exclude_cols: ["stock_code", "date", "target"]
    normalize: true
    feature_selection: true
    selected_features: 50
    rolling_window: false      # 有足够数据，可以使用固定划分验证
    
  # 数据源特定配置
  data_source_specific:
    local_csv:
      # 本地CSV数据（4.5年）配置
      use_simple_model: false
      feature_selection_threshold: 0.01
    qlib:
      # Qlib数据（16年）配置
      use_simple_model: false
      feature_selection_threshold: 0.005  # 更多数据，可以使用更严格的特征选择
    combined:
      # 合并数据（21年）配置
      use_simple_model: false
      feature_selection_threshold: 0.003  # 大量数据，可以使用最严格的特征选择
    
  # 特征选择
  feature_selection:
    method: "importance"
    threshold: 0.01  # 重要性阈值
    
  # 预测配置
  prediction:
    horizon: 1  # 预测未来1天（第二天上涨）
    top_n: 10   # 每日选股数量
    success_threshold: 0.6  # 选股成功率目标（60%）