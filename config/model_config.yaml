# model_config.yaml
model:
  name: "lightgbm"
  type: "regression"
  target: "return_2d"
  
  lightgbm_params:
    objective: "regression"
    metric: "rmse"
    boosting_type: "gbdt"
    num_leaves: 31
    learning_rate: 0.05
    feature_fraction: 0.9
    bagging_fraction: 0.8
    bagging_freq: 5
    verbose: 0
    
  training:
    early_stopping_rounds: 20  # 数据有限，减少早停轮数
    num_boost_round: 500       # 数据有限，减少训练轮数
    verbose_eval: 50
    
  validation:
    cv_folds: 3                # 数据有限，减少交叉验证折数
    time_series_cv: true
    rolling_window: true       # 使用滚动窗口验证
    
  # 特征选择
  feature_selection:
    method: "importance"
    threshold: 0.01  # 重要性阈值
    
  # 预测配置
  prediction:
    horizon: 2  # 预测未来2天
    top_n: 10   # 每日选股数量